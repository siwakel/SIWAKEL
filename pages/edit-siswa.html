<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Data Siswa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">
<h3>Edit Data Siswa</h3>
</div>

<div class="card-body">

<div class="mb-3">
<label>Nama</label>
<input type="text" id="nama" class="form-control">
</div>

<div class="mb-3">
<label>NIS</label>
<input type="text" id="nis" class="form-control">
</div>

<div class="mb-3">
<label>Jenis Kelamin</label>

<select id="jk" class="form-select">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

</div>

<div class="mb-3">
<label>Kelas</label>
<input type="text" id="kelas" class="form-control">
</div>

<button class="btn btn-success" onclick="simpanEdit()">
Simpan Perubahan
</button>

<a href="siswa.html" class="btn btn-secondary">
Kembali
</a>

</div>

</div>

</div>

<script>

let index = localStorage.getItem("editIndex");

let data = JSON.parse(localStorage.getItem("siswa")) || [];

document.getElementById("nama").value = data[index].nama;
document.getElementById("nis").value = data[index].nis;
document.getElementById("jk").value = data[index].jk;
document.getElementById("kelas").value = data[index].kelas;

function simpanEdit(){

    data[index].nama = document.getElementById("nama").value;
    data[index].nis = document.getElementById("nis").value;
    data[index].jk = document.getElementById("jk").value;
    data[index].kelas = document.getElementById("kelas").value;

    localStorage.setItem("siswa", JSON.stringify(data));

    alert("Data berhasil diperbarui.");

    window.location.href="siswa.html";

}

</script>

</body>
</html>
