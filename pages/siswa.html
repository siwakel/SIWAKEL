<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Data Siswa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">
<i class="fa-solid fa-users"></i>
Data Siswa
</h2>

<div class="mb-3">

<a href="tambah-siswa.html" class="btn btn-primary">
    <i class="fa-solid fa-plus"></i>
    Tambah Siswa
</a>

<a href="dashboard.html" class="btn btn-secondary">
Dashboard
</a>

</div>

<table class="table table-bordered table-striped">

<thead class="table-primary">

<tr>

<th>No</th>

<th>Nama</th>

<th>NIS</th>

<th>Jenis Kelamin</th>

<th>Kelas</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="dataSiswa">

</tbody>

</table>

</div>
<script>

function tampilkanData(){

    let data = JSON.parse(localStorage.getItem("siswa")) || [];

    let tabel = "";

    data.forEach((item,index)=>{

        tabel += `
        <tr>
            <td>${index+1}</td>
            <td>${item.nama}</td>
            <td>${item.nis}</td>
            <td>${item.jk}</td>
            <td>${item.kelas}</td>
            <td>
                <button class="btn btn-warning btn-sm"
        onclick="editSiswa(${index})">
    Edit
</button>

                <button class="btn btn-danger btn-sm"
                    onclick="hapusSiswa(${index})">
                    Hapus
                </button>
            </td>
        </tr>
        `;

    });

    document.getElementById("dataSiswa").innerHTML = tabel;

}

function hapusSiswa(index){

    if(confirm("Yakin ingin menghapus data ini?")){

        let data = JSON.parse(localStorage.getItem("siswa")) || [];

        data.splice(index,1);

        localStorage.setItem("siswa", JSON.stringify(data));

        tampilkanData();

    }

}

function editSiswa(index){

    localStorage.setItem("editIndex", index);

    window.location.href = "edit-siswa.html";

}

tampilkanData();

</script>
</body>
</html>
