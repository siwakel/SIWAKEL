<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIWAKEL | Tambah Data Siswa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white">

<h3>
<i class="fa-solid fa-user-plus"></i>
Tambah Data Siswa
</h3>

</div>

<div class="card-body">

<form id="formSiswa">

<div class="mb-3">
<label class="form-label">Nama Lengkap</label>
<input
type="text"
class="form-control"
id="nama"
placeholder="Masukkan nama lengkap"
required>
</div>

<div class="mb-3">
<label class="form-label">NIS</label>
<input
type="text"
class="form-control"
id="nis"
placeholder="Masukkan NIS"
required>
</div>

<div class="mb-3">
<label class="form-label">NISN</label>
<input
type="text"
class="form-control"
id="nisn"
placeholder="Masukkan NISN"
required>
</div>

<div class="mb-3">
<label class="form-label">Jenis Kelamin</label>

<select
class="form-select"
id="jk"
required>

<option value="">-- Pilih Jenis Kelamin --</option>
<option value="Laki-laki">Laki-laki</option>
<option value="Perempuan">Perempuan</option>

</select>

</div>

<div class="mb-3">
<label class="form-label">Kelas</label>

<input
type="text"
class="form-control"
id="kelas"
placeholder="Contoh : X TKJ 1"
required>

</div>

<div class="mb-3">

<label class="form-label">Alamat</label>

<textarea
class="form-control"
id="alamat"
rows="3"
placeholder="Masukkan alamat lengkap"
required></textarea>

</div>

<hr>

<button
type="button"
class="btn btn-success"
onclick="simpanSiswa()">

<i class="fa-solid fa-floppy-disk"></i>
Simpan Data

</button>

<button
type="reset"
class="btn btn-warning">

<i class="fa-solid fa-rotate-left"></i>
Reset

</button>

<a
href="siswa.html"
class="btn btn-secondary">

<i class="fa-solid fa-arrow-left"></i>
Kembali

</a>

</form>

</div>

</div>

</div>

<script>

document.getElementById("nama").focus();

function simpanSiswa(){

let nama=document.getElementById("nama").value.trim();
let nis=document.getElementById("nis").value.trim();
let nisn=document.getElementById("nisn").value.trim();
let jk=document.getElementById("jk").value;
let kelas=document.getElementById("kelas").value.trim();
let alamat=document.getElementById("alamat").value.trim();

if(nama=="" || nis=="" || nisn=="" || jk=="" || kelas=="" || alamat==""){

alert("Semua data harus diisi!");

return;

}

let data=JSON.parse(localStorage.getItem("siswa")) || [];

// Validasi NIS

let cekNIS=data.find(item=>item.nis===nis);

if(cekNIS){

alert("NIS sudah terdaftar!");

return;

}

// Validasi NISN

let cekNISN=data.find(item=>item.nisn===nisn);

if(cekNISN){

alert("NISN sudah terdaftar!");

return;

}

let siswa={

nama:nama,
nis:nis,
nisn:nisn,
jk:jk,
kelas:kelas,
alamat:alamat

};

data.push(siswa);

localStorage.setItem("siswa",JSON.stringify(data));

alert("Data siswa berhasil disimpan.");

document.getElementById("formSiswa").reset();

window.location.href="siswa.html";

}

</script>

</body>
</html>
