<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tambah Siswa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3><i class="fa-solid fa-user-plus"></i> Tambah Data Siswa</h3>
</div>

<div class="card-body">

<form>

<div class="mb-3">
<input type="text" class="form-control" id="nama">
<input type="text" class="form-control">
</div>

<div class="mb-3">
<input type="text" class="form-control" id="nis">
<input type="text" class="form-control">
</div>

<div class="mb-3">
<input type="text" class="form-control" id="nisn">
<input type="text" class="form-control">
</div>

<div class="mb-3">
<select class="form-select" id="jk">

<select class="form-select">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

</div>

<div class="mb-3">
<input type="text" class="form-control" id="kelas">
<input type="text" class="form-control">
</div>

<div class="mb-3">
<textarea class="form-control" id="alamat"></textarea>
<textarea class="form-control"></textarea>
</div>

<button type="button" class="btn btn-success" onclick="simpanSiswa()">
<i class="fa-solid fa-floppy-disk"></i>
Simpan
</button>

<a href="siswa.html" class="btn btn-secondary">
Kembali
</a>

</form>

</div>

</div>

</div>
<script>
function simpanSiswa(){

    let siswa = {
        nama: document.getElementById("nama").value,
        nis: document.getElementById("nis").value,
        nisn: document.getElementById("nisn").value,
        jk: document.getElementById("jk").value,
        kelas: document.getElementById("kelas").value,
        alamat: document.getElementById("alamat").value
    };

    let data = JSON.parse(localStorage.getItem("siswa")) || [];

    data.push(siswa);

    localStorage.setItem("siswa", JSON.stringify(data));

    alert("Data berhasil disimpan!");

    window.location.href="siswa.html";
}
</script>
</body>
</html>
